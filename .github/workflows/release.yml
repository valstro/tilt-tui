name: Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Build Linux x64 binary
        run: bun run build:binary --single

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: tilt-tui-linux-x64
          path: dist/tilt-tui-linux-x64/

  upload-release-assets:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: tilt-tui-linux-x64
          path: dist/tilt-tui-linux-x64/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/tilt-tui-linux-x64/bin/tilt-tui

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: tilt-tui-linux-x64
          path: dist/tilt-tui-linux-x64/

      - name: Configure CodeArtifact auth
        run: |
          # TODO: Replace with custom action for CodeArtifact authentication
          echo "Placeholder for CodeArtifact authentication"

      - name: Publish to npm
        run: npm publish
